# Copy to secrets.yaml (gitignored), fill the CHANGE_ME values, then:
#   kubectl apply -n skyportal -f secrets.yaml      (before `make install`)
apiVersion: v1
kind: Secret
metadata:
  name: skyportal-secrets
type: Opaque
stringData:
  postgres-password: "CHANGE_ME_db_password"
  config.yaml: |
    database:
      database: skyportal
      host: skyportal-postgres        # the in-cluster postgres Service
      port: 5432
      user: skyportal
      password: "CHANGE_ME_db_password"   # must equal postgres-password above
    app:
      secret_key: "CHANGE_ME_random_secret"
    server:
      protocol: https
      host: skyportal.nrp-nautilus.io
      port: 443                              # PUBLIC port — workers probe server.host:server.port/api/sysinfo
      ssl: True
      auth:
        debug_login: False
        google_oauth2_key: "CHANGE_ME_google_client_id"
        google_oauth2_secret: "CHANGE_ME_google_client_secret"
    # GCN: add gcn.client_id / client_secret / client_group_id / notice_types (see README).
    # Slack / facility API keys can also go here.
