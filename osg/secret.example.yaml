# Copy to osg/secret.yaml (gitignored), fill the CHANGE_ME / token values,
# then:  kubectl -n skyportal apply -f osg/secret.yaml   (or: make osg-secret)
#
# Holds (1) the plugin's config.yaml — only the services.external.osg.params
# OVERRIDES; the baked config.yaml.defaults supplies the rest — and (2) the
# SciToken file(s) ap41 submission + OSDF need. The mount paths below MUST match
# the *_token_path values in config.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: skyportal-osg-secret
type: Opaque
stringData:
  config.yaml: |
    services:
      external:
        osg:
          params:
            listener:
              host: 0.0.0.0
              port: 7100
            htcondor:
              # OSPool central managers that advertise the ap41 schedd. NOTE: from
              # NRP pods, cm-1:9618 is REFUSED but cm-2 is reachable, and the AP
              # (ap41:9618) is directly reachable — so list cm-2 FIRST (fast locate)
              # with cm-1 as fallback. The bindings need a reachable CM to resolve
              # the schedd ad; they can't hand-build the address.
              collector: "cm-2.ospool.osg-htc.org, cm-1.ospool.osg-htc.org"
              schedd: ap41.uw.osg-htc.org
              scitoken_path: /secrets/scitokens/osg.use
              project_name: UMN_Coughlin
              spool: true
              # Remote submission → park a held placeholder job so the credmon
              # keeps the SciToken fresh.
              keepalive: true
            defaults:
              request_cpus: 1
              request_memory: 2048
              request_disk: 1024
              max_runtime_seconds: 3600
              singularity_image: osdf:///ospool/ap41/data/michael.coughlin/fiesta-v1.sif
              # Always run the fiesta wrapper (this is an NMMA/fiesta service);
              # false would submit a /bin/sleep 60 test job instead.
              use_wrapper: true
            poller:
              interval_seconds: 60
            caps:
              max_concurrent_total: 50
              max_concurrent_per_analysis: 20
              max_concurrent_per_resource_per_analysis: 1
            osdf:
              # null → poller scrapes results from the job stdout via the schedd
              # log (no OSDF round-trip). Set an origin prefix to use OSDF bundles.
              output_prefix: null
              read_token_path: /secrets/scitokens/osdf-read.use
              write_token_path: /secrets/scitokens/osdf-write.use
            staging_dir: /tmp/staging
            auth:
              # Bearer token SkyPortal must send on /analysis/<name>. Must match
              # the AnalysisService row's _authinfo (register step). Generate one:
              #   python3 -c "import secrets; print(secrets.token_urlsafe(32))"
              incoming_bearer_token: "CHANGE_ME_incoming_bearer_token"

  # --- SciToken / OSDF token files (mounted into /secrets/scitokens) ---
  # ap41 submission IDTOKEN for the michael.coughlin OSG account. Fetch once
  # (see osg/README.md):
  #   ssh michael.coughlin@ap41.uw.osg-htc.org 'condor_token_fetch -lifetime 3600000' > osg.use
  # then paste the contents below (indented under the | block).
  osg.use: |
    CHANGE_ME_ap41_scitoken_contents
  # OSDF read/write tokens — only used when osdf.output_prefix is set. The
  # deployment mounts these keys, so keep a placeholder line even if unused.
  osdf-read.use: |
    CHANGE_ME_or_unused
  osdf-write.use: |
    CHANGE_ME_or_unused
